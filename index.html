<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

<script>
    // ==================== CONFIGURATION ====================
    const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwN6yUu3gO_kgud12VVB33VjdK-D7EDQZhmx7caxmiazBO_qSxEqkrHY2UmhUOSuL_v/exec'; // <-- REPLACE THIS

    let allStudents = [];
    let displayedStudents = [];
    let selectedStudents = new Set();
    let dataTable = null;
    let sessionToken = null;
    let isAdmin = false;
    let hasPerformedSearch = false;

    // Helper: JSONP request
    function jsonpRequest(params, callbackName, onSuccess, onError) {
        const script = document.createElement('script');
        const callbackFunc = 'jsonp_callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
        window[callbackFunc] = function(data) {
            delete window[callbackFunc];
            document.body.removeChild(script);
            if (data && !data.error) onSuccess(data);
            else onError(data && data.error ? data.error : 'Unknown error');
        };
        const urlParams = new URLSearchParams(params);
        urlParams.set('callback', callbackFunc);
        script.src = `${APP_SCRIPT_URL}?${urlParams.toString()}`;
        script.onerror = () => {
            delete window[callbackFunc];
            document.body.removeChild(script);
            onError('Network error or server unreachable');
        };
        document.body.appendChild(script);
    }

    // Login
    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
        loginError.classList.add('d-none');

        jsonpRequest(
            { action: 'login', username, password },
            'callback',
            (data) => {
                if (data.success) {
                    sessionToken = data.token;
                    isAdmin = (data.role === 'admin');
                    loadStudentData();
                } else {
                    loginError.textContent = data.error || 'Login failed';
                    loginError.classList.remove('d-none');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = 'Login';
                }
            },
            (errMsg) => {
                loginError.textContent = errMsg;
                loginError.classList.remove('d-none');
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Login';
            }
        );
    });

    function loadStudentData() {
        showLoadingModal(true);
        jsonpRequest(
            { action: 'getStudents', token: sessionToken },
            'callback',
            (data) => {
                showLoadingModal(false);
                if (data.success && data.students) {
                    allStudents = data.students.map((s, idx) => { s._id = idx; return s; });
                    displayedStudents = [...allStudents];
                    initDataTable(displayedStudents);
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('mainSection').style.display = 'block';
                    document.getElementById('totalStudents').innerText = allStudents.length;
                    document.getElementById('searchResults').innerText = allStudents.length;
                    document.getElementById('dataStatus').innerText = 'Loaded';
                } else {
                    alert('Failed to load data: ' + (data.error || 'Unknown error'));
                    logout();
                }
            },
            (err) => {
                showLoadingModal(false);
                alert('Error loading data: ' + err);
                logout();
            }
        );
    }

    // -------------------- DataTable & Helper functions --------------------
    // Copy all your original functions: initDataTable, searchSinglePRN, searchByName, 
    // searchByDivision, searchMultiplePRNs, clearSearch, exportSearchResultsToExcel,
    // copyToClipboard, toggleStudentSelection, toggleSelectAll, updateSelectedCount, etc.
    // Make sure they reference the global variables allStudents, displayedStudents, selectedStudents, dataTable.
    // For brevity, I include only the essential ones – you must copy the rest from your original script.

    function initDataTable(students) {
        displayedStudents = students;
        if (dataTable) dataTable.destroy();
        const tbody = $('#studentTable tbody');
        tbody.empty();
        students.forEach(s => {
            const checked = selectedStudents.has(s._id) ? 'checked' : '';
            const row = `<tr>
                <td class="checkbox-cell"><input type="checkbox" class="student-checkbox" data-id="${s._id}" ${checked} onchange="toggleStudentSelection(${s._id})"></td>
                <td>${s['Sr. No.'] || ''}</td><td>${s['Offering Year'] || ''}</td>
                <td><span class="badge-prn">${s.PRN || ''}</span></td>
                <td>${s['Student Name'] || ''}</td>
                <td><div class="mobile-container"><span>${s['Student Mobile'] || ''}</span><button class="copy-icon-btn" onclick="copyToClipboard('${s['Student Mobile']}','Mobile')"><i class="far fa-copy"></i></button></div></td>
                <td>${s['Parent Mobile'] || ''}</td>
                <td>${s['Email ID'] || ''}</td>
                <td>${s['Branch'] || ''}</td>
                <td>${s['Batches'] || ''}</td>
                <td>${s['Division'] || ''}</td>
                <td>${s['Parent Email ID'] || ''}</td>
            </tr>`;
            tbody.append(row);
        });
        dataTable = $('#studentTable').DataTable({ pageLength: 10, lengthMenu: [], columnDefs: [{ orderable: false, targets: 0 }] });
        updateSelectedCount();
    }

    function toggleStudentSelection(id) {
        if (selectedStudents.has(id)) selectedStudents.delete(id);
        else selectedStudents.add(id);
        updateSelectedCount();
        updateSelectAllCheckbox();
    }

    function toggleSelectAll() {
        const cb = document.getElementById('selectAllCheckbox');
        document.querySelectorAll('.student-checkbox').forEach(chk => {
            const id = parseInt(chk.getAttribute('data-id'));
            if (cb.checked) { selectedStudents.add(id); chk.checked = true; }
            else { selectedStudents.delete(id); chk.checked = false; }
        });
        updateSelectedCount();
    }

    function updateSelectedCount() {
        const cnt = selectedStudents.size;
        document.getElementById('selectedCount').innerText = cnt;
        document.getElementById('selectedForEmail').innerText = cnt;
        document.getElementById('emailDraftBtn').disabled = cnt === 0;
    }

    function updateSelectAllCheckbox() { /* implement as original */ }
    function copyToClipboard(text, label) { navigator.clipboard.writeText(text); alert(label+' copied'); }
    function showLoadingModal(show) { /* optional bootstrap modal */ }
    function logout() { sessionToken = null; location.reload(); }

    // Search functions – adapt from your original but they only filter allStudents
    function searchSinglePRN() { /* ... */ }
    function searchByName() { /* ... */ }
    function searchByDivision() { /* ... */ }
    function searchMultiplePRNs() { /* ... */ }

    function exportSearchResultsToExcel() { /* ... */ }

    document.addEventListener('DOMContentLoaded', () => {
        // Setup search input listeners, column toggles, etc.
        // For simplicity, call your original setup functions if you copy them.
    });
</script>
